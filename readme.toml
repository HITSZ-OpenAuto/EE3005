course_name = "DSP的原理与应用"
course_code = "EE3005"
repo_type = "normal"

[lecturers]

[[lecturers.items]]
name = "叶剑(已离职)"

[[lecturers.items.reviews]]
content = """
授课风格：摆，念ppt，还是用催眠的语速。
DSP在电机控制等方面应用其实很多，但是yj教的就是一坨，也没有什么网课资料，实验课学不到什么，上课点名你还不能跑，就纯纯无语
实验课报告没有明确格式，但是最后实验分都给的很低（怀疑压分），有单片机基础的同学实验课相对没有那么坐牢
"""

[[lecturers.items]]
name = "王宏"

[[lecturers.items.reviews]]
content = """
23 级起授课。
授课风格：上课几乎没有有效信息，几乎就是在吹水。PPT 是上一位老师留下来的，没有什么内容。
期末不知道出什么题，甚至在给例题时给了一道 187 行手写代码的编程题。
"""

[[sections]]
title = "教材"

[[sections.items]]
content = """
- **TMS320F28335 DSP 原理、开发及应用**（符晓 / 朱洪顺 / 清华大学出版社 / 2017 / textbook）
    - 一整本书类似于 datasheet，没有单片机基础的同学只能自求多福了。
    - 书相当于将几百页的数据手册给你讲解一遍，充满了横跨多页的各种模块的各种寄存器的各位数据功能的表格，但是你不得不看，因为要考。
"""

[[sections]]
title = "关于考试"

[[sections.items]]
content = "考试基本上是 F28335 手册内容，全都是 F28335 概念题，甚至没讲的也会考。"
author = { name = "SSC", link = "https://github.com/SSC202", date = "2024-11" }

[[sections.items]]
content = """
2023 级，结课一个半月后才进行考试，且考前三天老师还在群里说不知道怎么出，卷子水平可想而知（

选择题 10 题，基本都是基本概念的问答，简答题两题分别考察了 PIE 和 SCI，设计题两题分别考察 GPIO 和 ePWM，总体知识点不是特别偏，但是设计题也没有那么简单。

考试给出了 F28335 的引脚图、GPIO 多功能复用寄存器图、SCI 寄存器图以及 ePWM 寄存器图，后三个图是三道大题的考点。据老师所说，下一届要改成开卷考，考设计题。
"""
author = { name = "Gaster", link = "https://github.com/WDGaster703", date = "2026-01" }

[[sections]]
title = "学习建议"

[[sections.items]]
content = """
DSP 是电力电子软件方向非常重要的课程，基本上电力电子方向的企业都在用 DSP，课却上成这样确实不知道作何评论。建议自己在网上找一份 F28335 的课程自学。
"""
author = { name = "SSC", link = "https://github.com/SSC202", date = "2024-11" }

[[sections.items]]
content ="""
真想学的话还是去找些项目做吧，学数据手册是不可能学会DSP的。

实验也不需要自己写代码，都是使用给好的代码展示现象，思考题只需要简单修改即可（除了 ePWM 那个实验思考题需要设计）。
"""
author = { name = "Gaster", link = "https://github.com/WDGaster703", date = "2026-01" }
